name: Build Examples

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/examples.yml"
      - "scripts/discover_examples.py"
      - "releases/**"
      - "config/**"
      - "examples/esp-idf/**"
      - "examples/arduino/**"
  pull_request:
    paths:
      - ".github/workflows/examples.yml"
      - "scripts/discover_examples.py"
      - "releases/**"
      - "config/**"
      - "examples/esp-idf/**"
      - "examples/arduino/**"
  workflow_dispatch:
    inputs:
      target:
        description: "all, an example name, or a repo-relative example path"
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  discover-esp-idf:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          python3 scripts/discover_examples.py \
            --surface esp-idf \
            --selector "${{ github.event.inputs.target || 'all' }}" \
            --idf-versions v5.5.4,v6.0.2 \
            --github-output "$GITHUB_OUTPUT"

  build-esp-idf:
    needs: discover-esp-idf
    if: needs.discover-esp-idf.outputs.count != '0'
    runs-on: ubuntu-latest
    container: espressif/idf:${{ matrix.idf }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-esp-idf.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.path }} with ESP-IDF ${{ matrix.idf }}
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py --version
          idf.py -C "${{ matrix.path }}" -B "build/${{ matrix.name }}-${{ matrix.idf }}" set-target esp32s3 build
      - name: Package firmware
        shell: bash
        run: |
          python3 releases/package_firmware.py \
            --framework esp-idf \
            --project "${{ matrix.path }}" \
            --build-dir "build/${{ matrix.name }}-${{ matrix.idf }}" \
            --name "ESP32-S3-Touch-LCD-1.83-${{ matrix.name }}-${{ matrix.idf }}" \
            --framework-version "${{ matrix.idf }}" \
            --target esp32s3 \
            --git-sha "${{ github.sha }}" \
            --output-dir release-artifacts
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp-idf-${{ matrix.name }}-${{ matrix.idf }}
          path: release-artifacts/*.zip
          if-no-files-found: error

  discover-arduino:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          python3 scripts/discover_examples.py \
            --surface arduino \
            --selector "${{ github.event.inputs.target || 'all' }}" \
            --arduino-core 3.3.10 \
            --fqbn esp32:esp32:esp32s3 \
            --github-output "$GITHUB_OUTPUT"

  build-arduino:
    needs: discover-arduino
    if: needs.discover-arduino.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-arduino.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 Arduino core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@${{ matrix.core }}
      - name: Compile ${{ matrix.path }}
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --libraries examples/arduino/libraries \
            --export-binaries \
            --output-dir "build/${{ matrix.name }}-${{ matrix.core }}" \
            "${{ matrix.path }}"
      - name: Package firmware
        run: |
          python3 releases/package_firmware.py \
            --framework arduino \
            --project "${{ matrix.path }}" \
            --build-dir "build/${{ matrix.name }}-${{ matrix.core }}" \
            --name "ESP32-S3-Touch-LCD-1.83-${{ matrix.name }}-arduino-${{ matrix.core }}" \
            --framework-version "${{ matrix.core }}" \
            --target esp32s3 \
            --git-sha "${{ github.sha }}" \
            --output-dir release-artifacts
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-arduino-${{ matrix.name }}-${{ matrix.core }}
          path: release-artifacts/*.zip
          if-no-files-found: error
